name: setup
description: Build the embedded Svelte UI (ui/dist) and set up the Rust toolchain. No caching.

inputs:
  targets:
    description: Comma-separated rustup targets to install (e.g. x86_64-unknown-linux-musl).
    required: false
    default: ""
  components:
    description: Comma-separated rustup components to install (e.g. rustfmt, clippy).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    # The server binary embeds ui/dist via rust-embed, so the real UI must be built before any Rust
    # compile. (A build.rs scaffolds a placeholder so `cargo build` never *fails* without this, but
    # the UI tests and shipped binaries need the real bundle.)
    - name: Build the embedded management UI
      shell: bash
      working-directory: ui
      run: |
        npm ci
        npm run build
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.targets }}
        components: ${{ inputs.components }}
