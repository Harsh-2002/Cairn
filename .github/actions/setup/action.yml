name: setup
description: Build the embedded React web console (web/dist), set up the Rust toolchain, and restore the cargo build cache.

inputs:
  targets:
    description: Comma-separated rustup targets to install (e.g. x86_64-unknown-linux-musl).
    required: false
    default: ""
  components:
    description: Comma-separated rustup components to install (e.g. rustfmt, clippy).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        # Vite 8 requires Node >= 20.19; 22 LTS gives headroom.
        node-version: "22"
        # Cache the npm download cache, keyed on the web console lockfile, so `npm ci` is fast run-to-run.
        cache: npm
        cache-dependency-path: web/package-lock.json
    # The server binary embeds web/dist via rust-embed, so the real web console must be built before any Rust
    # compile. (A build.rs scaffolds a placeholder so `cargo build` never *fails* without this, but
    # the web console tests and shipped binaries need the real bundle.)
    - name: Build the embedded management web console
      shell: bash
      working-directory: web
      run: |
        npm ci
        npm run build
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.targets }}
        components: ${{ inputs.components }}
    # Restore the cargo registry + target dir across runs so the compile jobs are incremental rather
    # than cold every time. Keyed per-job by the action, so each profile/target keeps its own cache.
    - name: Restore the cargo build cache
      uses: Swatinem/rust-cache@v2
