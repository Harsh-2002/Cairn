name: Release

# Cuts a release when a v* tag is pushed (or on manual dispatch): builds static, fully
# self-contained binaries for linux/amd64 and linux/arm64 (musl, UI embedded), publishes multi-arch
# Docker images to GHCR, and attaches the binaries + checksums to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload assets
  packages: write # push images to GHCR

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: static binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
          - arch: arm64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          targets: ${{ matrix.target }}
      # cargo-zigbuild carries a complete musl sysroot for both arches, so the vendored C deps
      # (aws-lc-rs, bundled SQLite, zstd) cross-compile + statically link cleanly with no Docker.
      - run: pip install ziglang
      - uses: taiki-e/install-action@cargo-zigbuild
      - name: Build the static release binary
        run: cargo zigbuild --release --bin cairn --target ${{ matrix.target }}
      - name: Stage + verify the binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/cairn" "dist/cairn-${{ matrix.arch }}"
          file "dist/cairn-${{ matrix.arch }}"
          file "dist/cairn-${{ matrix.arch }}" | grep -qiE "statically linked|static-pie linked" \
            || { echo "binary is not statically linked"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: cairn-${{ matrix.arch }}
          path: dist/cairn-${{ matrix.arch }}

  docker:
    name: multi-arch docker image
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: cairn-*
          path: artifacts
      - name: Assemble the Docker build context
        run: |
          mkdir -p dist
          cp artifacts/cairn-amd64/cairn-amd64 dist/cairn-amd64
          cp artifacts/cairn-arm64/cairn-arm64 dist/cairn-arm64
          chmod +x dist/cairn-amd64 dist/cairn-arm64
      - name: Lowercase image name (GHCR requires lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: github release
    needs: binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: cairn-*
          path: artifacts
      - name: Assemble release assets + checksums
        run: |
          mkdir -p rel
          cp artifacts/cairn-amd64/cairn-amd64 rel/cairn-linux-amd64
          cp artifacts/cairn-arm64/cairn-arm64 rel/cairn-linux-arm64
          cd rel && sha256sum cairn-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: rel/*
          generate_release_notes: true
