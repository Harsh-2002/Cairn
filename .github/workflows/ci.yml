name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: endsWith(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --target ${{ matrix.target }}
      - run: cargo test --workspace --doc

  static-binary:
    name: static musl binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin cairn --target x86_64-unknown-linux-musl
      - name: Verify the binary is statically linked
        run: |
          BIN=target/x86_64-unknown-linux-musl/release/cairn
          file "$BIN"
          ldd "$BIN" 2>&1 | grep -q "not a dynamic executable" || { echo "binary is not static"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: cairn-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/cairn

  static-binary-aarch64:
    name: static musl binary (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      # Cross-compile with `cross`, NOT a hand-wired apt cross-gcc. This crate has vendored C deps
      # (aws-lc-rs, bundled SQLite, zstd) that must be compiled against a *musl* sysroot for an
      # aarch64-musl target. Debian ships no `aarch64-linux-musl-gcc`; using the aarch64 *gnu*
      # cross-gcc instead mixes glibc headers with musl libc and the final link fails on
      # `__isoc23_sscanf` / `open64` / `stat64` (glibc-only symbols the C deps pull in but musl
      # lacks). `cross` runs the build in a container carrying the correct aarch64 musl toolchain +
      # sysroot, so the vendored C links cleanly. This recipe was validated locally: it produces an
      # "ELF 64-bit LSB executable, ARM aarch64, ... statically linked" cairn binary.
      - uses: taiki-e/install-action@cross
      - name: Build the aarch64 static binary
        run: cross build --release --bin cairn --target aarch64-unknown-linux-musl
      - name: Verify the binary is aarch64 and statically linked
        run: |
          BIN=target/aarch64-unknown-linux-musl/release/cairn
          file "$BIN"
          file "$BIN" | grep -q "ARM aarch64" || { echo "binary is not aarch64"; exit 1; }
          file "$BIN" | grep -qiE "statically linked|static-pie linked" || {
            echo "binary is not statically linked"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: cairn-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/cairn

  conformance:
    name: boto3 conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install boto3
      - run: cargo build --bin cairn
      - name: Drive Cairn with the AWS SDK (real SigV4 + aws-chunked streaming, the F-5 path)
        run: BIN=target/debug/cairn PY=python3 bash conformance/run.sh

  crash-consistency:
    name: crash consistency (F-4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Arm the durability fault seam, crash in the window, assert reconcile reclaims
        run: bash conformance/crash_consistency.sh

  warp:
    name: warp macro benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin cairn
      - name: Run the real MinIO warp benchmark against a fresh Cairn (get/put/mixed, strict)
        run: BIN=target/debug/cairn bash conformance/warp.sh

  soak:
    name: replication soak (multi-host)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install boto3
      - run: cargo build --bin cairn
      - name: Two-node replication soak — sustained PUTs, byte-identical verify, RSS leak check
        run: BIN=target/debug/cairn PY=python3 DURATION=120 bash conformance/soak.sh

  fuzz-smoke:
    name: fuzz smoke (decoder, xml, policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-fuzz
      - run: cargo fuzz run chunked_decoder -- -max_total_time=45
        working-directory: crates/cairn-s3
      - run: cargo fuzz run request_parsers -- -max_total_time=30
        working-directory: crates/cairn-xml
      - run: cargo fuzz run parse_policy -- -max_total_time=30
        working-directory: crates/cairn-authz

  benches:
    name: benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info
