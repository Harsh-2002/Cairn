name: Deploy website

# Builds the Astro landing page and deploys it to GitHub Pages via the official Pages actions
# (OIDC, no gh-pages branch, no bot commits). Triggers only on the `website` branch, so shipping
# the Cairn object store never rebuilds this site and vice-versa.
on:
  push:
    branches: [website]
  workflow_dispatch:

# Least-privilege + what the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
