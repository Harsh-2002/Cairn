# Static, dependency-free musl builds for distroless/scratch containers.
# These targets are exercised in CI; local development uses the host gnu target.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
