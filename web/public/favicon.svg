<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- The Cairn mark: a single rounded square, matching the in-app logo (sidebar + login header).
       Monochrome, foreground-coloured in both themes (#0a0a0a light / #ededed dark); the 0.25
       corner-radius ratio mirrors the in-app `size-4 rounded` (16px box, 4px radius). -->
  <style>
    rect { fill: #0a0a0a; }
    @media (prefers-color-scheme: dark) { rect { fill: #ededed; } }
  </style>
  <rect x="3" y="3" width="26" height="26" rx="6.5" />
</svg>
